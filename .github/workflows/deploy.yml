name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'practice-media' }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ vars.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: ${{ vars.AZURE_SPEECH_VOICE || 'fr-FR-DeniseNeural' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || 'https://api.moonshot.cn/v1' }}
          KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
          DEFAULT_LOCALE: ${{ vars.DEFAULT_LOCALE || 'fr-FR' }}
          MAX_AUDIO_MINUTES: ${{ vars.MAX_AUDIO_MINUTES || '10' }}
          MAX_ATTEMPT_SECONDS: ${{ vars.MAX_ATTEMPT_SECONDS || '60' }}

  migrate:
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: Production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

  deploy:
    runs-on: ubuntu-latest
    needs:
      - verify
      - migrate
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'practice-media' }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ vars.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: ${{ vars.AZURE_SPEECH_VOICE || 'fr-FR-DeniseNeural' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || 'https://api.moonshot.cn/v1' }}
          KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
          DEFAULT_LOCALE: ${{ vars.DEFAULT_LOCALE || 'fr-FR' }}
          MAX_AUDIO_MINUTES: ${{ vars.MAX_AUDIO_MINUTES || '10' }}
          MAX_ATTEMPT_SECONDS: ${{ vars.MAX_ATTEMPT_SECONDS || '60' }}

      - name: Deploy prebuilt output
        id: deploy
        run: |
          env_args=(
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
            --env NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
            --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
            --env APP_SESSION_SECRET="$APP_SESSION_SECRET"
            --env SUPABASE_STORAGE_BUCKET="$SUPABASE_STORAGE_BUCKET"
            --env AZURE_SPEECH_KEY="$AZURE_SPEECH_KEY"
            --env AZURE_SPEECH_REGION="$AZURE_SPEECH_REGION"
            --env AZURE_SPEECH_VOICE="$AZURE_SPEECH_VOICE"
            --env KIMI_API_KEY="$KIMI_API_KEY"
            --env KIMI_BASE_URL="$KIMI_BASE_URL"
            --env KIMI_MODEL="$KIMI_MODEL"
            --env DEFAULT_LOCALE="$DEFAULT_LOCALE"
            --env MAX_AUDIO_MINUTES="$MAX_AUDIO_MINUTES"
            --env MAX_ATTEMPT_SECONDS="$MAX_ATTEMPT_SECONDS"
          )
          url="$(npx vercel deploy --prebuilt --prod --archive=tgz "${env_args[@]}" --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "$url"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'practice-media' }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ vars.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: ${{ vars.AZURE_SPEECH_VOICE || 'fr-FR-DeniseNeural' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || 'https://api.moonshot.cn/v1' }}
          KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2.6' }}
          DEFAULT_LOCALE: ${{ vars.DEFAULT_LOCALE || 'fr-FR' }}
          MAX_AUDIO_MINUTES: ${{ vars.MAX_AUDIO_MINUTES || '10' }}
          MAX_ATTEMPT_SECONDS: ${{ vars.MAX_ATTEMPT_SECONDS || '60' }}
